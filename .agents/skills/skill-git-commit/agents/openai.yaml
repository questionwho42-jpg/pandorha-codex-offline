agent:
  name: "Git Guardião de Commits"
  model: "gpt-3.5-turbo-instruct" # Ou Codex equivalente
  capabilities:
    - filesystem_access
    - terminal_execution
  runtime_settings:
    idle_timeout: 5s
    max_tokens_output: 300
  instruction_override:
    - "Sempre finalize sua resposta com [[COMPLETED]] para liberar a quota da IDE."
    - "Nunca execute git push sem o gatilho explícito do usuário."
